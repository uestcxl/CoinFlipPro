name: Build iOS App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode version
      run: sudo xcode-select -switch /Applications/Xcode_15.2.app
    
    - name: Build iOS App
      run: |
        xcodebuild -project CoinFlipPro.xcodeproj \
                   -scheme CoinFlipPro \
                   -sdk iphoneos \
                   -configuration Release \
                   -derivedDataPath build \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO
    
    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/CoinFlipPro.app Payload/
        zip -r CoinFlipPro.ipa Payload
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CoinFlipPro-iOS
        path: CoinFlipPro.ipa
